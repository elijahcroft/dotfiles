# ============================================================
#  hypridle — staged idle management
#  suspend only (after long idle)
# ============================================================

general {
    lock_cmd = pidof hyprlock || hyprlock          # avoid stacking lock instances
    before_sleep_cmd = loginctl lock-session        # lock before the system suspends
    after_sleep_cmd = hyprctl dispatch dpms on      # wake the display on resume
}

# 5400s (90 min) — suspend
listener {
    timeout = 5400
    on-timeout = systemctl suspend
}
