# ============================================================
#  hyprlock — minimal monochrome
#  blurred screen · centered white time · single glass input
#  (matches waybar / wofi / hyprland rice)
# ============================================================

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    disable_loading_bar = true
}

background {
    monitor =
    color = rgba(18, 18, 20, 1.0)
    # Blur the current screen instead of a static image
    path = screenshot
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    contrast = 1.0
    brightness = 0.55
    vibrancy = 0.18
}

# --- Time (large, white) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 96
    font_family = SF Pro Text
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.45)
}

# --- Date ---
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(207, 207, 207, 1.0)
    font_size = 18
    font_family = SF Pro Text
    position = 0, 40
    halign = center
    valign = center
}

# --- Password input: glass pill matching wofi #input ---
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 1
    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true
    dots_rounding = -1
    rounding = 10

    outer_color = rgba(255, 255, 255, 0.07)
    inner_color = rgba(42, 42, 45, 0.95)
    font_color = rgba(255, 255, 255, 1.0)

    fade_on_empty = false
    placeholder_text = <span foreground="##6e6e73">Password</span>
    hide_input = false

    check_color = rgba(255, 255, 255, 1.0)
    fail_color = rgba(138, 138, 142, 1.0)
    fail_text = <span foreground="##8a8a8e">$FAIL ($ATTEMPTS)</span>

    position = 0, -60
    halign = center
    valign = center
}
