
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = Dolphin
$menu = wofi --show drun
$controlCenter = ~/.config/hypr/scripts/ghostty-control-center.sh

# Rice palette: white & minimal. Soft white accent on neutral grey.
$accent = rgba(ffffffff)
$accent_alt = rgba(c8c8c8ff)
$border_dim = rgba(3a3a3aaa)
$shadow = rgba(00000077)

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = eww open quote
exec-once = waybar & hyprpaper
#exec-once = eww daemon
exec-once = dunst                                   # notification daemon
exec-once = hypridle                                # idle: dim -> lock -> dpms -> suspend
exec-once = wl-paste --watch cliphist store         # clipboard history

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 6
    gaps_out = 12

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    # Single soft frost border (no gradient) for a calmer, minimal look.
    col.active_border = $accent
    col.inactive_border = $border_dim

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0

    inactive_opacity = 0.94

    dim_inactive = true
    dim_strength = 0.04

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = $shadow
        color_inactive = rgba(00000044)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 6
        passes = 2

        vibrancy = 0.18
        noise = 0.02
        contrast = 1.0
        brightness = 0.92
        popups = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = workspace,      0.25, 1,    0.5,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    # Smooth, non-bouncy glide: everything settles on easeOutQuint, scale-in
    # without overshoot.
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     8,     default
    animation = border,        1,     6,     easeOutQuint
    animation = windows,       1,     6,     easeOutQuint
    animation = windowsIn,     1,     6,     easeOutQuint,  popin 92%
    animation = windowsOut,    1,     5,     easeOutQuint,  popin 92%
    animation = fadeIn,        1,     3,     almostLinear
    animation = fadeOut,       1,     3,     almostLinear
    animation = fade,          1,     3,     quick
    animation = layers,        1,     5,     easeOutQuint
    animation = layersIn,      1,     5,     easeOutQuint,  slide
    animation = layersOut,     1,     3,     quick,         slide
    animation = fadeLayersIn,  1,     2,     almostLinear
    animation = fadeLayersOut, 1,     2,     almostLinear
    animation = workspaces,    1,     4,     workspace,     slidefade 18%
    animation = workspacesIn,  1,     4,     workspace,     slidefade 18%
    animation = workspacesOut, 1,     4,     workspace,     slidefade 18%
    animation = zoomFactor,    1,     6,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# indowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    # Pseudotiling is toggled per-window with mainMod + P.
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Disable the default mascot wallpapers.
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, G, exec, $controlCenter        # SUPER+G       -> Toggle QOL center
bind = $mainMod SHIFT, G, exec, $controlCenter --close # SUPER+Shift+G -> Quit QOL center

# Video wall - a clean multiviewer web app on its own special workspace. SUPER+Y
# toggles it up/away like a scratchpad (the jam keeps running while hidden). On
# the wall: E to edit the lineup, SHARE button / J for a "jam" QR so friends on
# the same Wi-Fi add links from their phones (Spotify-Jam style).
$videowall = ~/.config/hypr/scripts/video-wall.sh
bind = $mainMod, Y, exec, $videowall              # SUPER+Y       -> Toggle the video wall
bind = $mainMod SHIFT, Y, exec, $videowall --close # SUPER+Shift+Y -> Quit the video wall

bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, ghostty -e lf
bind = $mainMod, B, exec, ~/.config/hypr/scripts/show-binds.sh
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, R, exec, $menu
bind = $mainMod, L, exec, hyprlock                                  # SUPER+L       -> Lock screen
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/clipmenu.sh # SUPER+Shift+V -> Clipboard history
bind = $mainMod, Escape, exec, wlogout -p layer-shell              # SUPER+Escape  -> Power menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, left, exec, ~/.config/hypr/scripts/pack-workspaces-left.sh # SUPER+Shift+Left -> Pack occupied workspaces left

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = ALT, TAB, workspace, +1
bind =  SUPER, TAB, workspace, -1
bind = SUPER_SHIFT, D, exec, sh -c "hyprctl clients -j | jq -r '.[].address' | while read addr; do hyprctl dispatch closewindow address:\$addr; done"
# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Screenshots — copy to clipboard (and save to disk via hyprshot)
bind = , Print, exec, hyprshot -m region                                          # Region -> clipboard
bind = SHIFT, Print, exec, hyprshot -m window                                     # Active window -> clipboard
bind = CTRL, Print, exec, hyprshot -m output                                      # Full screen -> clipboard
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | satty --filename - --copy-command wl-copy  # Region -> annotate

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Glass polish for bars, launchers, and popups.
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.2, match:namespace wofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.2, match:namespace notifications

# Give terminals and helper windows a bit of glass without making focused work
# hard to read.
windowrule = opacity 0.97 0.92, match:class ^(kitty)$
windowrule = opacity 0.97 0.92, match:class ^(ghostty)$
windowrule = opacity 0.97 0.92, match:class ^(com.mitchellh.ghostty)$
windowrule = float 1, match:class ^(ghostty-control-center)$
windowrule = size 90% 86%, match:class ^(ghostty-control-center)$
windowrule = center 1, match:class ^(ghostty-control-center)$
windowrule = opacity 0.98 0.94, match:class ^(ghostty-control-center)$
windowrule = border_size 2, match:class ^(ghostty-control-center)$
windowrule = border_color rgb(ffffff), match:class ^(ghostty-control-center)$

# AI coding agent kitty borders.
windowrule = border_size 3, match:class ^(ai-.+)$
windowrule = opacity 0.98 0.94, match:class ^(ai-.+)$
windowrule = border_color rgb(d97757), match:class ^(ai-claude-.+)$
windowrule = border_color rgb(f59e0b), match:class ^(ai-claude-sonnet)$
windowrule = border_color rgb(ec4899), match:class ^(ai-claude-opus)$
windowrule = border_color rgb(10a37f), match:class ^(ai-codex-.+)$

# Video wall opens fullscreen via its launcher script (see SUPER+Y bind).

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event active maximize

# Fix some dragging issues with XWayland
windowrule =  match:xwayland 0, match:float 1,  match:title ^$

